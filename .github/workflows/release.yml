name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact: yamldb-linux
            odbc_artifact: libyamldb-linux-odbc.so
            ext: ''
            dylib: libyamldb.so
          - os: windows-latest
            artifact: yamldb-windows.exe
            odbc_artifact: yamldb-windows-odbc.dll
            ext: '.exe'
            dylib: yamldb.dll
          - os: macos-latest
            artifact: yamldb-macos
            odbc_artifact: libyamldb-macos-odbc.dylib
            ext: ''
            dylib: libyamldb.dylib
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install yq
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version=v4.52.4
          os=linux
          if [ "$RUNNER_OS" = "macOS" ]; then
            os=darwin
          fi
          arch=amd64
          if [ "$(uname -m)" = "arm64" ] || [ "$(uname -m)" = "aarch64" ]; then
            arch=arm64
          fi
          sudo curl -L "https://github.com/mikefarah/yq/releases/download/${version}/yq_${os}_${arch}" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Install yq
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "v4.52.4"
          $path = Join-Path $env:RUNNER_TEMP "yq.exe"
          Invoke-WebRequest "https://github.com/mikefarah/yq/releases/download/$version/yq_windows_amd64.exe" -OutFile $path
          Add-Content $env:GITHUB_PATH $env:RUNNER_TEMP
          & $path --version
      - run: cargo fmt --check
      - run: cargo test --verbose
      - run: cargo clippy -- -D warnings
      - run: cargo build --release
      - name: Rename artifacts
        run: cp target/release/yamldb${{ matrix.ext }} ${{ matrix.artifact }}
      - name: Rename ODBC driver
        run: cp target/release/${{ matrix.dylib }} ${{ matrix.odbc_artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.odbc_artifact }}

  build-jdbc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install yq
        shell: bash
        run: |
          set -euo pipefail
          version=v4.52.4
          sudo curl -L "https://github.com/mikefarah/yq/releases/download/${version}/yq_linux_amd64" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - run: bash jdbc/build.sh
      - run: cp jdbc/target/yamldb-jdbc.jar yamldb-jdbc.jar
      - uses: actions/upload-artifact@v4
        with:
          name: jdbc-artifact
          path: yamldb-jdbc.jar

  release:
    needs: [build, build-jdbc]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            yamldb-*
            libyamldb-*
